<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<style>
  :root{
    --gold:#c6a35d;
    --gold-light:#e8d2a0;
    --ink:#0c0d10;
    --ink-2:#15171c;
    --glass: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.14);
  }
  *{box-sizing:border-box;}

  body{
    margin:0;
    min-height:100vh;
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    background:
      radial-gradient(circle at 15% 10%, rgba(198,163,93,0.10), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(198,163,93,0.08), transparent 45%),
      linear-gradient(160deg, var(--ink) 0%, var(--ink-2) 60%, #0a0a0c 100%);
    color:#f4efe4;
    padding:40px 20px 80px;
    perspective:1600px;
    overflow-x:hidden;
  }

  .lens-ring{
    position:fixed;
    border-radius:50%;
    border:1px solid rgba(198,163,93,0.16);
    box-shadow: inset 0 0 40px rgba(198,163,93,0.07);
    animation: drift 16s ease-in-out infinite;
    pointer-events:none;
    z-index:0;
  }
  .lens-ring.r1{width:460px;height:460px; top:-160px; left:-160px;}
  .lens-ring.r2{width:320px;height:320px; bottom:-120px; right:-100px; animation-delay:3s;}

  @keyframes drift{
    0%,100%{ transform: translateY(0) rotate(0deg); }
    50%{ transform: translateY(-16px) rotate(5deg); }
  }

  .topbar{
    position:relative;
    z-index:1;
    max-width:760px;
    margin:0 auto 32px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }

  .brandmark{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .monogram{
    width:42px;height:42px;
    border-radius:50%;
    border:1.5px solid var(--gold);
    display:flex;align-items:center;justify-content:center;
    font-family: Georgia, 'Times New Roman', serif;
    font-size:16px;
    color:var(--gold-light);
    background: radial-gradient(circle at 30% 30%, rgba(198,163,93,0.18), transparent 70%);
    box-shadow: 0 0 14px rgba(198,163,93,0.25), inset 0 0 8px rgba(198,163,93,0.15);
  }
  h2{
    font-family: Georgia, 'Times New Roman', serif;
    font-weight:500;
    letter-spacing:0.5px;
    margin:0;
    font-size:22px;
  }

  button[onclick="logout()"]{
    padding:10px 20px;
    border:1px solid rgba(255,255,255,0.16);
    border-radius:9px;
    background: rgba(255,255,255,0.04);
    color:#e8d2a0;
    font-size:13px;
    letter-spacing:0.4px;
    cursor:pointer;
    transition: border-color .2s, background .2s, transform .2s;
  }
  button[onclick="logout()"]:hover{
    border-color: var(--gold);
    background: rgba(198,163,93,0.08);
    transform: translateY(-1px);
  }

  .card{
    position:relative;
    z-index:1;
    max-width:760px;
    margin:0 auto 36px;
    padding:34px 32px;
    border-radius:20px;
    background: var(--glass);
    border:1px solid var(--glass-border);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    box-shadow:
      0 30px 60px -25px rgba(0,0,0,0.7),
      0 1px 0 rgba(255,255,255,0.08) inset;
    transform: translateZ(10px) rotateX(1.5deg);
    transition: transform .4s ease;
  }
  .card::before{
    content:"";
    position:absolute;
    top:0; left:8%; right:8%;
    height:2px;
    background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
    filter: drop-shadow(0 0 6px rgba(198,163,93,0.6));
  }

  .card h3{
    margin:0 0 22px;
    font-size:14px;
    letter-spacing:1.2px;
    text-transform:uppercase;
    color:#a9966b;
    font-weight:600;
  }

  form{ display:flex; flex-direction:column; gap:16px; }

  .field input{
    width:100%;
    padding:13px 16px;
    background: rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:10px;
    color:#f4efe4;
    font-size:14.5px;
    outline:none;
    transition: border-color .25s, box-shadow .25s, background .25s;
  }
  .field input::placeholder{ color:#73747a; }
  .field input:focus{
    border-color: var(--gold);
    background: rgba(198,163,93,0.06);
    box-shadow: 0 0 0 3px rgba(198,163,93,0.15);
  }

  button[type="submit"]{
    margin-top:6px;
    padding:13px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:14.5px;
    font-weight:600;
    letter-spacing:0.6px;
    color:#1a1305;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    box-shadow: 0 12px 24px -10px rgba(198,163,93,0.5), inset 0 1px 0 rgba(255,255,255,0.5);
    transition: transform .2s ease, box-shadow .2s ease, filter .2s ease;
  }
  button[type="submit"]:hover{
    transform: translateY(-2px);
    box-shadow: 0 16px 28px -10px rgba(198,163,93,0.6), inset 0 1px 0 rgba(255,255,255,0.5);
    filter:brightness(1.05);
  }

  #list{
    position:relative;
    z-index:1;
    max-width:760px;
    margin:0 auto;
    padding:0;
    list-style:none;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  #list li{
    padding:16px 20px;
    border-radius:12px;
    background: rgba(255,255,255,0.045);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 24px -16px rgba(0,0,0,0.6);
    transition: transform .2s ease, border-color .2s ease;
  }
  #list li:hover{
    transform: translateX(4px);
    border-color: rgba(198,163,93,0.4);
  }
  #list li:empty{ display:none; }

  @media (prefers-reduced-motion: reduce){
    .lens-ring{ animation:none !important; }
  }

  @media (max-width:480px){
    .topbar, .card, #list{ max-width:100%; }
    .card{ padding:26px 20px; }
  }
</style>
</head>
<body>

<div class="lens-ring r1"></div>
<div class="lens-ring r2"></div>

<div class="topbar">
  <div class="brandmark">
    <div class="monogram">F·L</div>
    <h2>Dashboard</h2>
  </div>
  <button onclick="logout()">Logout</button>
</div>

<div class="card">
  <h3>Add Customer</h3>
  <form id="customerForm">
    <div class="field"><input type="text" id="name" placeholder="Name" required></div>
    <div class="field"><input type="text" id="phone" placeholder="Phone" required></div>
    <div class="field"><input type="text" id="address" placeholder="Address" required></div>
    <button type="submit">Save</button>
  </form>
</div>

<ul id="list"></ul>

<script type="module" src="app.js"></script>

</body>
</html>
